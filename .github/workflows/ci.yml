name: Django CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Django check
        run: uv run python manage.py check

      - name: Run tests
        run: uv run pytest

      - name: Check formatting
        run: uv run black --check .

      - name: Run Pylint
        run: uv run pylint Restaurant RestaurantApp

      - name: Check migrations
        run: uv run python manage.py makemigrations --check --dry-run
